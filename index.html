<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Asil Kuyumcum</title>
<link rel="manifest" id="manifestLink" href="manifest.json">
<meta name="theme-color" content="#b8960c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Asil Kuyumcum">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
/* GENEL STİLLER */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: #1a1a1a; color: #f0e6c8;
  max-width: 480px; margin: 0 auto;
  min-height: 100vh; display: flex; flex-direction: column;
}

/* MASAÜSTÜ DÜZELTME */
@media (min-width: 768px) {
  body { max-width: 100%; flex-direction: row; flex-wrap: wrap; }
  .header, .ticker-container { width: 100%; }
  .main-content { display: flex; width: 100%; gap: 20px; padding: 20px; }
  .price-section { flex: 1; }
  .customer-section { flex: 1; display: block !important; }
}

/* ADMİN OVERLAY DÜZELTME */
#adminOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.95); z-index: 99999; /* En üstte olması için */
  display: none; overflow-y: auto; padding: 20px;
}
.admin-content { max-width: 800px; margin: 0 auto; background: #2a2a2a; padding: 20px; border-radius: 15px; }

/* DİĞER STİLLER (Önceki kodunuzdan korunmuştur) */
.ticker-container { background: #000; overflow: hidden; white-space: nowrap; padding: 10px 0; border-bottom: 1px solid #b8960c; }
.ticker-wrapper { display: inline-block; animation: ticker 30s linear infinite; }
@keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
.price-card { background: #262626; border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; }
.admin-tab-content { display: none; margin-top: 20px; }
.active-tab { display: block !important; }
</style>
</head>
<body>

<div id="adminOverlay">
  <div class="admin-content">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2>Yönetim Paneli</h2>
        <button onclick="closeAdmin()" style="background:red; color:white; border:none; padding:10px; border-radius:5px;">Kapat</button>
    </div>
    
    <div class="admin-tabs" style="display:flex; gap:10px; margin-bottom:20px;">
        <button onclick="showAdminTab('genelTab')">Genel</button>
        <button onclick="showAdminTab('dovizTab')">Döviz</button>
        <button onclick="showAdminTab('hurdaTab')">Hurda</button>
        <button onclick="showAdminTab('urunTab')">Ürün Ekle</button>
    </div>

    <div id="genelTab" class="admin-tab-content active-tab">
        </div>

    <div id="dovizTab" class="admin-tab-content">
        <div id="dovizRows"></div>
    </div>

    <div id="hurdaTab" class="admin-tab-content">
        <div id="ekstraHurdaRows"></div>
    </div>

    <div id="urunTab" class="admin-tab-content">
        <h3>Yeni Ürün Ekle</h3>
        <input type="text" id="urunAd" placeholder="Ürün Adı" style="width:100%; padding:10px; margin:5px 0;">
        <input type="number" id="urunGram" placeholder="Gramaj" style="width:100%; padding:10px; margin:5px 0;">
        <select id="urunAyar" style="width:100%; padding:10px; margin:5px 0;">
            <option value="14">14 Ayar</option>
            <option value="18">18 Ayar</option>
            <option value="22">22 Ayar</option>
        </select>
        <button onclick="urunKaydet()" style="width:100%; padding:15px; background:gold; color:black; font-weight:bold; border:none; margin-top:10px;">KAYDET</button>
        <hr style="margin:20px 0;">
        <div id="urunListesiAdmin"></div>
    </div>
  </div>
</div>

<script>
// AYARLAR VE BAŞLANGIÇ
let settings = JSON.parse(localStorage.getItem('asilKuyumcumSettings')) || {
    urunler: [],
    dovizCarp: {},
    hurdaCarp: {},
    hasAlisManual: 3000,
    hasSatisManual: 3050
};

// Sayfa yüklendiğinde manifest hatasını önle
window.addEventListener('load', () => {
    const manifestLink = document.getElementById('manifestLink');
    if (manifestLink && window.location.search.indexOf('admin') !== -1) {
        manifestLink.href = 'manifest-admin.json';
    }
    renderEverything();
});

function saveSettings() {
    localStorage.setItem('asilKuyumcumSettings', JSON.stringify(settings));
    renderEverything();
}

// ÜRÜN KAYDETME FONKSİYONU
function urunKaydet() {
    const ad = document.getElementById('urunAd').value;
    const gram = document.getElementById('urunGram').value;
    const ayar = document.getElementById('urunAyar').value;

    if(!ad || !gram) {
        alert("Lütfen ürün adı ve gramaj giriniz!");
        return;
    }

    const yeniUrun = {
        id: Date.now(),
        ad: ad,
        gram: parseFloat(gram),
        ayar: ayar
    };

    settings.urunler.push(yeniUrun);
    saveSettings();
    
    // Formu temizle
    document.getElementById('urunAd').value = '';
    document.getElementById('urunGram').value = '';
    alert("Ürün eklendi!");
}

// TAB YÖNETİMİ (MASAÜSTÜ İÇİN DÜZELTİLDİ)
function showAdminTab(tabId) {
    document.querySelectorAll('.admin-tab-content').forEach(tab => {
        tab.classList.remove('active-tab');
    });
    document.getElementById(tabId).classList.add('active-tab');
}

// FİYATLARI VE TICKER'I GÜNCELLE
function renderEverything() {
    updatePrices(); // Ana fiyatlar
    renderProductList(); // Ürün listesi
    updateTicker(); // Kayan yazı - Artık Manuel fiyatları da kapsıyor
}

function updateTicker() {
    const tickerWrapper = document.querySelector('.ticker-wrapper');
    if(!tickerWrapper) return;
    
    // Kayan yazı içeriğini admin panelindeki manuel fiyatlara göre oluştur
    const hasAlis = settings.hasAlisManual || 0;
    const hasSatis = settings.hasSatisManual || 0;
    
    tickerWrapper.innerHTML = `
        <span> HAS ALTIN: Alış ${hasAlis} TL | Satış ${hasSatis} TL </span>
        <span> &nbsp;&nbsp; | &nbsp;&nbsp; </span>
        <span> 22 AYAR: ${(hasAlis * 0.916).toFixed(2)} TL </span>
    `;
}

function openAdmin() { document.getElementById('adminOverlay').style.display = 'block'; }
function closeAdmin() { document.getElementById('adminOverlay').style.display = 'none'; }
</script>

</body>
</html>
