<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Asil Kuyumcum</title>
<link rel="manifest" id="manifestLink" href="manifest.json">
<meta name="theme-color" content="#b8960c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
/* ── TEMEL STİLLER ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: #1a1a1a; color: #f0e6c8;
  margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column;
}

/* ── MASAÜSTÜ DÜZELTME ── */
@media (min-width: 768px) {
  body { max-width: 100%; }
  .main-container { display: flex; flex-direction: row; padding: 20px; gap: 20px; }
  .price-section { flex: 1; }
  .product-section { flex: 1; }
}

/* ── ADMİN PANELİ DÜZELTMELERİ ── */
#adminOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.95); z-index: 999999;
  display: none; overflow-y: auto; padding: 20px;
}
.admin-window { 
  background: #262626; max-width: 900px; margin: 20px auto; 
  border-radius: 15px; border: 1px solid #b8960c; padding: 20px;
}
.tab-content { display: none; }
.tab-content.active { display: block !important; }

/* ── TICKER (HAREKETLİ MOD) ── */
.ticker-container { background: #000; overflow: hidden; padding: 12px 0; border-bottom: 1px solid #b8960c; }
.ticker-wrapper { display: inline-block; white-space: nowrap; animation: tickerAnim 25s linear infinite; font-weight: bold; }
@keyframes tickerAnim { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

/* Diğer tablo stilleri orijinal index-18 ile aynı kalmıştır */
.price-card { background: #262626; border-radius: 10px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; }
</style>
</head>
<body>

<div class="header" style="text-align:center; padding:20px; background:#111;">
    <h1 style="color:gold;">ASİL KUYUMCUM</h1>
</div>

<div class="ticker-container">
    <div id="tickerText" class="ticker-wrapper">Fiyatlar güncelleniyor...</div>
</div>

<div class="main-container">
    <div class="price-section">
        <div id="priceCards"></div>
        <button onclick="openAdmin()" style="width:100%; padding:15px; background:gold; border:none; margin-top:20px; font-weight:bold; cursor:pointer;">YÖNETİM PANELİ</button>
    </div>
    <div class="product-section" id="customerProductArea">
        </div>
</div>

<div id="adminOverlay">
    <div class="admin-window">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #444; padding-bottom:10px;">
            <h3>Yönetim Paneli</h3>
            <button onclick="closeAdmin()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Kapat</button>
        </div>

        <div style="display:flex; gap:10px; margin:15px 0;">
            <button onclick="switchTab('tabFiyat')" style="padding:10px; flex:1;">Fiyatlar</button>
            <button onclick="switchTab('tabUrun')" style="padding:10px; flex:1;">Ürün Ekle</button>
            <button onclick="switchTab('tabDoviz')" style="padding:10px; flex:1;">Döviz/Hurda</button>
        </div>

        <div id="tabFiyat" class="tab-content active">
            <label>Has Alış:</label>
            <input type="number" id="inpHasAlis" style="width:100%; padding:10px; margin:10px 0;">
            <label>Has Satış:</label>
            <input type="number" id="inpHasSatis" style="width:100%; padding:10px; margin:10px 0;">
            <button onclick="saveManualPrices()" style="width:100%; padding:12px; background:green; color:white; border:none;">Fiyatları Kaydet</button>
        </div>

        <div id="tabUrun" class="tab-content">
            <input type="text" id="pName" placeholder="Ürün Adı" style="width:100%; padding:10px; margin:5px 0;">
            <input type="number" id="pGram" placeholder="Gramaj" style="width:100%; padding:10px; margin:5px 0;">
            <button onclick="addProduct()" style="width:100%; padding:12px; background:gold; border:none; font-weight:bold;">ÜRÜNÜ LİSTEYE EKLE</button>
            <div id="adminProductList" style="margin-top:20px;"></div>
        </div>

        <div id="tabDoviz" class="tab-content">
            <p style="padding:20px; text-align:center;">Döviz ve Hurda çarpanları buradan yönetilebilir.</p>
        </div>
    </div>
</div>

<script>
// VERİ YAPISI
let settings = JSON.parse(localStorage.getItem('asilKuyumcumSettings')) || {
    hasAlis: 3000,
    hasSatis: 3050,
    urunler: []
};

// SAYFA YÜKLENDİĞİNDE ÇALIŞACAK
window.onload = function() {
    // Manifest hatasını önlemek için güvenli kontrol
    const mLink = document.getElementById('manifestLink');
    if(mLink && window.location.search.includes('admin')) {
        mLink.href = 'manifest-admin.json';
    }
    
    document.getElementById('inpHasAlis').value = settings.hasAlis;
    document.getElementById('inpHasSatis').value = settings.hasSatis;
    
    renderAll();
};

function renderAll() {
    const al = settings.hasAlis;
    const sat = settings.hasSatis;

    // Fiyat Kartlarını Güncelle
    document.getElementById('priceCards').innerHTML = `
        <div class="price-card"><h3>HAS ALTIN</h3><p>Alış: ${al} | Satış: ${sat}</p></div>
        <div class="price-card"><h3>22 AYAR</h3><p>Alış: ${(al*0.916).toFixed(2)} | Satış: ${(sat*0.916).toFixed(2)}</p></div>
        <div class="price-card"><h3>14 AYAR</h3><p>Alış: ${(al*0.585).toFixed(2)} | Satış: ${(sat*0.585).toFixed(2)}</p></div>
    `;

    // Hareketli Modu (Ticker) Güncelle
    document.getElementById('tickerText').innerText = 
        `HAS: ${al}/${sat} TL -- 22 AYAR: ${(al*0.916).toFixed(0)} TL -- 14 AYAR: ${(al*0.585).toFixed(0)} TL -- ASİL KUYUMCUM HAYIRLI ALIŞVERİŞLER DİLER -- `;

    // Ürün Listesini Güncelle
    let uHtml = '<table border="1" style="width:100%; border-collapse:collapse;"><tr><th>Ürün</th><th>Gram</th><th>Sil</th></tr>';
    settings.urunler.forEach((u, i) => {
        uHtml += `<tr><td>${u.ad}</td><td>${u.gram}g</td><td><button onclick="removeProduct(${i})">Sil</button></td></tr>`;
    });
    uHtml += '</table>';
    document.getElementById('customerProductArea').innerHTML = "<h3>Ürün Listesi</h3>" + uHtml;
    document.getElementById('adminProductList').innerHTML = uHtml;
}

function saveManualPrices() {
    settings.hasAlis = parseFloat(document.getElementById('inpHasAlis').value);
    settings.hasSatis = parseFloat(document.getElementById('inpHasSatis').value);
    saveData();
    alert("Fiyatlar güncellendi!");
}

function addProduct() {
    const ad = document.getElementById('pName').value;
    const gram = document.getElementById('pGram').value;
    if(!ad || !gram) return alert("Bilgileri doldurun!");
    
    settings.urunler.push({ ad, gram });
    saveData();
    document.getElementById('pName').value = "";
    document.getElementById('pGram').value = "";
}

function removeProduct(i) {
    settings.urunler.splice(i, 1);
    saveData();
}

function saveData() {
    localStorage.setItem('asilKuyumcumSettings', JSON.stringify(settings));
    renderAll();
}

function openAdmin() { document.getElementById('adminOverlay').style.display = 'block'; }
function closeAdmin() { document.getElementById('adminOverlay').style.display = 'none'; }

function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
