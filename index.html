<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Asil Kuyumcum</title>
<link rel="manifest" id="manifestLink" href="manifest.json">
<script>
window.addEventListener("DOMContentLoaded", function () {
  if (window.location.search.indexOf('admin') !== -1) {
    var m=document.getElementById('manifestLink');
    if(m){m.href='manifest-admin.json';}
  }
});
</script>
<meta name="theme-color" content="#b8960c">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: #1a1a1a; color: #f0e6c8;
  max-width: 480px; margin: 0 auto;
  min-height: 100vh; display: flex; flex-direction: column;
}

/* ── MASAÜSTÜ RESPONSIVE ── */
@media (min-width: 768px) {
  body {
    max-width: 100%;
    flex-direction: column;
  }
  .header {
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    text-align: left;
  }
  .header .logo { width: 80px; height: 80px; margin-bottom: 0; }
  .header h1 { font-size: 28px; }
  .header .phone { font-size: 17px; border-top: none; padding-top: 0; margin-top: 4px; }
  .has-info { font-size: 14px; }
  .admin-btn { right: 24px; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; font-size: 22px; }
  .mod-btn { left: 24px; top: 50%; transform: translateY(-50%); }

  .doviz-bant-inner { padding: 10px 0; }
  .doviz-item { font-size: 15px; margin: 0 32px; }

  .desktop-layout {
    display: flex;
    flex: 1;
    gap: 0;
  }
  .desktop-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .desktop-side {
    flex: 1;
    min-width: 0;
    background: #141414;
    border-left: 1px solid #333;
    display: flex;
    flex-direction: column;
  }

  .table-header {
    padding: 12px 24px;
    grid-template-columns: 1.5fr 1fr 1fr 1.1fr;
  }
  .table-header span { font-size: 15px; }

  .price-row {
    padding: 12px 24px;
    grid-template-columns: 1.5fr 1fr 1fr 1.1fr;
  }
  .price-row .birim { font-size: 17px; }
  .price-row .alis, .price-row .satis { font-size: 17px; }
  .price-row .kk { font-size: 15px; }

  .update-bar { padding: 12px 24px; }
  .bottom-nav { display: none; }

  .overlay { align-items: center; }
  .admin-panel { border-radius: 18px; max-width: 560px; max-height: 88vh; }

  #adminEkstra { display: none !important; }
}

@media (min-width: 1200px) {
  .price-row .birim { font-size: 18px; }
  .price-row .alis, .price-row .satis { font-size: 18px; }
}
.header { text-align: center; padding: 16px 16px 10px; position: relative; background: #111; border-bottom: 2px solid #b8960c; }
.header .logo { width: 90px; height: 90px; border-radius: 50%; margin-bottom: 8px; }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; color: #f0d060; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
.header .phone { font-size: 15px; color: #c8b88a; margin-top: 4px; padding-top: 5px; border-top: 1px solid #444; display: inline-block; min-width: 100px; }
.has-info { font-size: 12px; color: #5dba6a; margin-top: 4px; display: block; font-weight: 500; }
.has-info.err { color: #e05050; }
.admin-btn { position: absolute; right: 14px; top: 20px; width: 38px; height: 38px; border-radius: 50%; border: 1px solid #555; background: #2a2a2a; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #c8b88a; }

/* Döviz bandı */
.doviz-bant { background: #111; border-bottom: 1px solid #333; overflow: hidden; white-space: nowrap; padding: 0; }
.doviz-bant-inner { display: inline-block; padding: 7px 0; animation: dovizKay 28s linear infinite; }
.doviz-bant-inner:hover { animation-play-state: paused; }
@keyframes dovizKay { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.doviz-item { display: inline-block; margin: 0 22px; font-size: 13px; font-weight: 600; color: #c8b88a; }
.doviz-item .d-kur { color: #f0d060; }
.doviz-item .d-up { color: #2ecc71; }
.doviz-item .d-dn { color: #e74c3c; }

.table-header { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1.1fr; padding: 10px 12px; background: #222; border-top: 1px solid #444; border-bottom: 1px solid #444; }
.table-header span { font-size: 14px; font-weight: 700; color: #d4af37; letter-spacing: 0.5px; }
.table-header span:nth-child(2), .table-header span:nth-child(3), .table-header span:nth-child(4) { text-align: right; }
.table-header span:nth-child(4) { color: #7ab0e0; }

.price-row { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1.1fr; padding: 13px 12px; border-bottom: 1px solid #2e2e2e; align-items: center; }
.price-row:nth-child(even) { background: #202020; }
.price-row .birim { font-size: 17px; font-weight: 500; color: #e8d9b0; }
.price-row .alis, .price-row .satis { text-align: right; font-size: 17px; transition: color 0.4s ease; font-weight: 600; }
.price-row .kk { text-align: right; font-size: 15px; font-weight: 600; color: #7ab0e0; }
.price-up   { color: #2ecc71 !important; font-weight: 700 !important; }
.price-down { color: #e74c3c !important; font-weight: 700 !important; }
.price-same { color: #f0e6c8 !important; }
@keyframes flashUp   { 0%{background:#d5f5e3} 100%{background:transparent} }
@keyframes flashDown { 0%{background:#fde8e8} 100%{background:transparent} }
.flash-up   { animation: flashUp   0.8s ease-out; }
.flash-down { animation: flashDown 0.8s ease-out; }

.update-bar { text-align: center; padding: 10px 16px 12px; margin-top: auto; background: #111; }
.upd-text { display: inline-block; background: #2a2a2a; border-radius: 20px; padding: 6px 18px; font-size: 13px; color: #c8b88a; border: 1px solid #3a3a3a; }
.upd-src { display: block; font-size: 11px; margin-top: 3px; color: #666; }
.upd-src.ok { color: #2ecc71; }
.upd-src.err { color: #e74c3c; }

.bottom-nav { display: flex; border-top: 1px solid #333; background: #111; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 12px; font-size: 12px; color: #888; cursor: pointer; gap: 4px; border: none; background: none; }
.nav-item.active { color: #d4af37; }
.nav-icon { font-size: 22px; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.admin-panel { background: #1e1e1e; width: 100%; max-width: 480px; border-radius: 18px 18px 0 0; max-height: 92vh; overflow-y: auto; padding-bottom: 34px; border-top: 2px solid #b8960c; }
.admin-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 12px; border-bottom: 1px solid #333; position: sticky; top: 0; background: #1e1e1e; z-index: 1; }
.admin-header h2 { font-size: 17px; font-weight: 600; color: #d4af37; }
.close-btn { width: 30px; height: 30px; border-radius: 50%; background: #333; border: none; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #ccc; }
.sec-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #d4af37; padding: 14px 18px 6px; }
.has-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 18px; background: #252510; border-bottom: 1px solid #3a3a20; }
.has-row-label { font-size: 13px; color: #c8a840; }
.has-row-val { font-size: 15px; font-weight: 700; color: #f0d060; font-family: monospace; }
.admin-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; border-bottom: 1px solid #2a2a2a; gap: 6px; }
.row-label { font-size: 14px; min-width: 100px; font-weight: 500; color: #e0d0a0; }
.inp-group { display: flex; align-items: center; gap: 4px; }
.admin-inp { padding: 7px 8px; border: 1px solid #444; border-radius: 8px; font-size: 14px; text-align: right; color: #f0e6c8; background: #2a2a2a; width: 82px; }
.admin-inp:focus { outline: none; border-color: #d4af37; background: #333; }
.inp-unit { font-size: 11px; color: #888; }
.prev-a { font-size: 11px; color: #aaa; min-width: 58px; text-align: right; }
.prev-s { font-size: 11px; color: #e07050; min-width: 58px; text-align: right; }
.hint-box { margin: 4px 18px; background: #252515; border: 1px solid #4a4a20; border-radius: 8px; padding: 9px 12px; font-size: 12px; color: #c8b060; line-height: 1.7; }
.admin-save-btn { display: block; width: calc(100% - 36px); margin: 16px 18px 0; background: #b8960c; color: #fff; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
.admin-save-btn:active { background: #9a7e0a; }
.admin-reset-btn { display: block; width: calc(100% - 36px); margin: 10px 18px 0; background: none; color: #666; border: 1px solid #444; padding: 11px; border-radius: 12px; font-size: 14px; cursor: pointer; }
.mod-btn { position: absolute; left: 14px; top: 20px; height: 38px; padding: 0 12px; border-radius: 19px; border: 1.5px solid #555; background: #2a2a2a; font-size: 12px; font-weight: 700; cursor: pointer; color: #c8b88a; display: none; align-items: center; }
.mod-btn.hareketli { background: #3a2200; border-color: #e07020; color: #f0a040; }
.item-del-btn { background: #6b1a1a; border: none; color: #ff8080; border-radius: 6px; width: 28px; height: 28px; font-size: 16px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.item-del-btn:active { background: #9a1a1a; }
.add-item-box { margin: 8px 18px 0; background: #1a1a2a; border: 1px solid #2a2a4a; border-radius: 10px; padding: 12px 14px; }
.add-item-box p { font-size: 12px; color: #d4af37; margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.add-item-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.add-item-inp { padding: 7px 8px; border: 1px solid #444; border-radius: 8px; font-size: 13px; color: #f0e6c8; background: #2a2a2a; }
.add-item-inp:focus { outline: none; border-color: #d4af37; }
.add-item-btn { background: #1a5a1a; color: #5dba6a; border: 1px solid #2a6a2a; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
.add-item-btn:active { background: #1a7a1a; }
.admin-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; border-bottom: 1px solid #2a2a2a; gap: 6px; flex-wrap: wrap; }

.share-box { margin: 8px 18px 0; background: #1a2a1a; border: 1px solid #2a4a2a; border-radius: 10px; padding: 12px 14px; }
.share-box p { font-size: 13px; color: #5dba6a; margin-bottom: 8px; font-weight: 600; }
.share-box small { font-size: 11px; color: #666; display: block; margin-top: 6px; line-height: 1.5; }
.share-link { font-size: 11px; color: #7ab0e0; word-break: break-all; margin: 6px 0; display: block; background: #1a2030; padding: 6px 8px; border-radius: 6px; }
.btn-row { display: flex; gap: 8px; margin-top: 8px; }
.copy-btn { flex:1; display: flex; align-items: center; justify-content: center; gap: 5px; background: #1a4a8a; color: #fff; border: none; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.wa-btn   { flex:1; display: flex; align-items: center; justify-content: center; gap: 5px; background: #1a8a40; color: #fff; border: none; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }

.toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%) translateY(8px); background: #b8960c; color: #fff; padding: 9px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 200; white-space: nowrap; font-weight: 600; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

/* TV MODE */

  background:#000;
}

<body>

<div class="header">
  <img src="logo.png" class="logo" alt="Asil Kuyumcum"> <!-- logo dosyanı değiştir -->
  <div>
    <h1>Asil Kuyumcum</h1>
    <span class="phone">📞 0XXX XXX XX XX</span>
    <span class="has-info">Güncel Fiyatlar</span>
  </div>
  <button id="adminBtn" class="admin-btn">🔧</button>
  <button id="modBtn" class="mod-btn">Hareketli</button>
</div>

<div id="dovizBant" class="doviz-bant">
  <div class="doviz-bant-inner" id="dovizBantInner"></div>
</div>

<div class="desktop-layout">
  <div class="desktop-main">
    <div class="table-header">
      <span>Ürün</span>
      <span>Alış</span>
      <span>Satış</span>
      <span>₺/gr (KK)</span>
    </div>
    <div id="priceRows"></div>
    <div class="update-bar">
      <span class="upd-text">Son güncelleme: <span id="lastUpdate">—</span></span>
      <span class="upd-src" id="updSrc">Kaynak: —</span>
    </div>
  </div>

  <div id="desktopSide" class="desktop-side">
    <div class="sec-title">DÖVİZ KURLARI (Canlı)</div>
    <div id="desktopDovizRows"></div>

    <div class="sec-title" style="margin-top:16px">HURDA ALTIN</div>
    <div id="desktopHurdaRows"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-item active"><span class="nav-icon">🏠</span><span>Anasayfa</span></button>
  <button class="nav-item"><span class="nav-icon">📊</span><span>Fiyatlar</span></button>
  <button class="nav-item"><span class="nav-icon">⚙️</span><span>Ayarlar</span></button>
</div>

<div id="overlay" class="overlay">
  <div class="admin-panel">
    <div class="admin-header">
      <h2>Admin Paneli</h2>
      <button class="close-btn" onclick="closeAdmin()">✖</button>
    </div>

    <div class="sec-title">MAĞAZA BİLGİLERİ</div>
    <div class="admin-row">
      <span class="row-label">Mağaza Adı</span>
      <input class="admin-inp" type="text" id="shopName" style="width:180px;text-align:left">
    </div>

    <div class="sec-title">24 AYAR ALTIN AYARLARI</div>
    <div id="adminRows"></div>

    <div class="sec-title">HAREKETLİ MOD ÇARPANLARI</div>
    <div id="adminHareketliRows"></div>

    <div class="sec-title">DÖVİZ DÜZELTMELERİ</div>
    <div id="adminDovizRows"></div>

    <div class="sec-title">HURDA ÇARPANLARI</div>
    <div id="adminHurdaRows"></div>

    <div class="sec-title">YENİ ÜRÜN EKLE</div>
    <div class="add-item-box">
      <p>Yeni Özel Ürün Ekle</p>
      <div class="add-item-row">
        <input class="add-item-inp" id="newLabel" placeholder="Ürün adı" style="flex:2">
        <input class="add-item-inp" id="newAlisX" type="number" step="0.0001" placeholder="Alış ×" style="width:90px">
        <input class="add-item-inp" id="newSatisX" type="number" step="0.0001" placeholder="Satış ×" style="width:90px">
        <button class="add-item-btn" onclick="addUrun()">Ekle</button>
      </div>
    </div>

    <button class="admin-save-btn" onclick="saveAdmin()">KAYDET & YAYINLA</button>
    <button class="admin-reset-btn" onclick="resetAdmin()">SIFIRLA</button>
  </div>
</div>

<button class="tv-btn" onclick="toggleTV()">TV MODU</button>

<div id="toast" class="toast"></div>

<script>
// ── GLOBAL DEĞİŞKENLER ───────────────────────────────────────────────────────
let settings = {};
let IS_ADMIN = false;
let ADMIN_PASS = '1234'; // varsayılan – değiştir
let liveDoviz = {};
let cachedUsdTry = 0;
let hasAlis = 0, hasSatis = 0;

// ── VARSAYILANLAR ─────────────────────────────────────────────────────────────
const ITEMS = [
  {id:'24', label:'24 Ayar Gram Altın', defA:1.00, defS:1.00},
  {id:'22', label:'22 Ayar Bilezik',   defA:0.916, defS:0.925},
  // diğer ürünler...
];

const DOVIZLER = [
  {id:'usd', flag:'🇺🇸', label:'Dolar'},
  {id:'eur', flag:'🇪🇺', label:'Euro'},
  {id:'gbp', flag:'🇬🇧', label:'Sterlin'},
  {id:'sar', flag:'🇸🇦', label:'Riyal'},
  {id:'chf', flag:'🇨🇭', label:'Frang'},
];

const HURDALAR = [
  {id:'hurda22', label:'22 Ayar Hurda', oran:22/24},
  {id:'hurda14', label:'14 Ayar Hurda', oran:14/24},
  {id:'hurda8',  label:'8 Ayar Hurda',  oran:8/24},
];

// ── YARDIMCI FONKSİYONLAR ─────────────────────────────────────────────────────
function fmt(n) {
  return new Intl.NumberFormat('tr-TR').format(Math.round(n));
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function makeDefaults() {
  const s = {
    shopName: "Asil Kuyumcum",
    labor: {},
    laborH: {},
    dovizDuz: {},
    hurdaCarp: {},
    customItems: [],
    adminPass: '1234'
  };
  ITEMS.forEach(it => {
    s.labor[it.id] = {a: it.defA, s: it.defS};
    s.laborH[it.id] = {a: it.defA, s: it.defS};
  });
  return s;
}

function loadSettings() {
  try {
    const saved = localStorage.getItem('gp10');
    if (saved) {
      const parsed = JSON.parse(saved);
      // laborH yoksa kopyala
      if (!parsed.laborH) {
        parsed.laborH = JSON.parse(JSON.stringify(parsed.labor || {}));
      }
      return parsed;
    }
  } catch(e) {}
  return makeDefaults();
}

function ensureLaborH() {
  if (!settings.laborH) {
    settings.laborH = JSON.parse(JSON.stringify(settings.labor || {}));
  }
}

// ── ADMIN AÇ/KAPA ─────────────────────────────────────────────────────────────
function openAdmin() {
  document.getElementById('overlay').classList.add('open');
  renderAdmin();
  renderAdminDoviz();
  renderAdminHurda();
  document.getElementById('shopName').value = settings.shopName || '';
}

function closeAdmin() {
  document.getElementById('overlay').classList.remove('open');
}

// ── TABLO RENDER ──────────────────────────────────────────────────────────────
function renderTable() {
  let html = '';
  const allItems = [...ITEMS, ...(settings.customItems || [])];

  allItems.forEach(item => {
    const labor = settings.labor?.[item.id] || {a:item.defA, s:item.defS};
    const laborH = settings.laborH?.[item.id] || labor;

    const isHareketli = document.getElementById('modBtn')?.classList.contains('hareketli');
    const a = isHareketli ? laborH.a : labor.a;
    const s = isHareketli ? laborH.s : labor.s;

    const alis  = Math.round(hasAlis  * a);
    const satis = Math.round(hasSatis * s);

    html += `
      <div class="price-row">
        <div class="birim">${item.label}</div>
        <div class="alis">${fmt(alis)}</div>
        <div class="satis">${fmt(satis)}</div>
        <div class="kk">—</div>
      </div>`;
  });

  document.getElementById('priceRows').innerHTML = html;
}

// ── ADMIN SATIRLARI ───────────────────────────────────────────────────────────
function renderAdminRows() {
  ensureLaborH();
  let html = '';
  const allItems = [...ITEMS, ...(settings.customItems || [])];

  allItems.forEach(item => {
    const la = settings.labor?.[item.id]?.a ?? item.defA;
    const ls = settings.labor?.[item.id]?.s ?? item.defS;
    const ha = settings.laborH?.[item.id]?.a ?? la;
    const hs = settings.laborH?.[item.id]?.s ?? ls;

    html += `
      <div class="admin-row">
        <span class="row-label">${item.label}</span>
        <div class="inp-group">
          <input class="admin-inp" id="a_${item.id}" type="number" step="0.0001" value="${la.toFixed(4)}">
          <span class="inp-unit">×</span>
        </div>
        <div class="inp-group">
          <input class="admin-inp" id="s_${item.id}" type="number" step="0.0001" value="${ls.toFixed(4)}">
          <span class="inp-unit">×</span>
        </div>
        <div class="inp-group">
          <input class="admin-inp" id="ah_${item.id}" type="number" step="0.0001" value="${ha.toFixed(4)}">
          <span class="inp-unit">H×</span>
        </div>
        <div class="inp-group">
          <input class="admin-inp" id="sh_${item.id}" type="number" step="0.0001" value="${hs.toFixed(4)}">
          <span class="inp-unit">H×</span>
        </div>
      </div>`;
  });
  document.getElementById('adminRows').innerHTML = html;

  // Hareketli mod satırları
  let hHtml = '';
  allItems.forEach(item => {
    const ha = settings.laborH?.[item.id]?.a ?? (settings.labor?.[item.id]?.a ?? item.defA);
    const hs = settings.laborH?.[item.id]?.s ?? (settings.labor?.[item.id]?.s ?? item.defS);

    hHtml += `
      <div class="admin-row">
        <span class="row-label">${item.label} (Hareketli)</span>
        <div class="inp-group">
          <input class="admin-inp" id="ah_${item.id}" type="number" step="0.0001" value="${ha.toFixed(4)}">
          <span class="inp-unit">×</span>
        </div>
        <div class="inp-group">
          <input class="admin-inp" id="sh_${item.id}" type="number" step="0.0001" value="${hs.toFixed(4)}">
          <span class="inp-unit">×</span>
        </div>
      </div>`;
  });
  document.getElementById('adminHareketliRows').innerHTML = hHtml;
}

// ── DÖVİZ & HURDA RENDER (admin + desktop) ────────────────────────────────────
function renderAdminDoviz() {
  let html = '';
  DOVIZLER.forEach(d => {
    const duzA = settings.dovizDuz?.[d.id+'A'] || 0;
    const duzS = settings.dovizDuz?.[d.id+'S'] || 0;
    const alis  = liveDoviz[d.id+'Alis'] ? (liveDoviz[d.id+'Alis'] + duzA).toFixed(2) : '—';
    const satis = liveDoviz[d.id+'Satis'] ? (liveDoviz[d.id+'Satis'] + duzS).toFixed(2) : '—';

    html += `
      <div class="admin-row">
        <span class="row-label">${d.flag} ${d.label}</span>
        <span style="color:#5dba6a;min-width:70px">${alis} ₺</span>
        <span style="color:#e07050;min-width:70px">${satis} ₺</span>
        <div class="inp-group"><input class="admin-inp" id="duzA_${d.id}" type="number" step="0.01" value="${duzA}"><span class="inp-unit">A±</span></div>
        <div class="inp-group"><input class="admin-inp" id="duzS_${d.id}" type="number" step="0.01" value="${duzS}"><span class="inp-unit">S±</span></div>
      </div>`;
  });
  document.getElementById('adminDovizRows').innerHTML = html;
}

function renderAdminHurda() {
  let html = '';
  HURDALAR.forEach(h => {
    const carpA = settings.hurdaCarp?.[h.id+'A'] || (h.oran * 0.99);
    const carpS = settings.hurdaCarp?.[h.id+'S'] || h.oran;
    const alis  = hasAlis  ? Math.round(hasAlis  * carpA) : '—';
    const satis = hasSatis ? Math.round(hasSatis * carpS) : '—';

    html += `
      <div class="admin-row">
        <span class="row-label">${h.label}</span>
        <span style="color:#5dba6a;min-width:70px">${alis === '—' ? '—' : fmt(alis)} ₺</span>
        <span style="color:#e07050;min-width:70px">${satis === '—' ? '—' : fmt(satis)} ₺</span>
        <div class="inp-group"><input class="admin-inp" id="hurdaA_${h.id}" type="number" step="0.0001" value="${carpA.toFixed(4)}"><span class="inp-unit">×</span></div>
        <div class="inp-group"><input class="admin-inp" id="hurdaS_${h.id}" type="number" step="0.0001" value="${carpS.toFixed(4)}"><span class="inp-unit">×</span></div>
      </div>`;
  });
  document.getElementById('adminHurdaRows').innerHTML = html;
}

function renderDesktopPanel() {
  const side = document.getElementById('desktopSide');
  if (!side) return;

  const isAdmin = location.search.includes('admin') || location.hash.includes('admin');
  const isDesktop = window.innerWidth >= 768;
  side.style.display = (isAdmin && isDesktop) ? 'flex' : 'none';

  if (!isAdmin || !isDesktop) return;

  // Döviz
  let dovizHtml = '';
  DOVIZLER.forEach(d => {
    const duzA = settings.dovizDuz?.[d.id+'A'] || 0;
    const duzS = settings.dovizDuz?.[d.id+'S'] || 0;
    const alis  = liveDoviz[d.id+'Alis'] ? (liveDoviz[d.id+'Alis'] + duzA).toFixed(2) : '—';
    const satis = liveDoviz[d.id+'Satis'] ? (liveDoviz[d.id+'Satis'] + duzS).toFixed(2) : '—';

    dovizHtml += `
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;padding:11px 18px;border-bottom:1px solid #2e2e2e;background:#1a1a1a">
        <span style="font-size:17px;font-weight:600;color:#e8d9b0">${d.flag} ${d.label}</span>
        <span style="font-size:17px;font-weight:600;color:#5dba6a;text-align:right">${alis}</span>
        <span style="font-size:17px;font-weight:600;color:#e07050;text-align:right">${satis}</span>
      </div>`;
  });
  document.getElementById('desktopDovizRows').innerHTML = dovizHtml;

  // Hurda
  let hurdaHtml = '';
  HURDALAR.forEach(h => {
    const carpA = settings.hurdaCarp?.[h.id+'A'] || (h.oran * 0.99);
    const carpS = settings.hurdaCarp?.[h.id+'S'] || h.oran;
    const alis  = hasAlis  ? fmt(Math.round(hasAlis  * carpA)) : '—';
    const satis = hasSatis ? fmt(Math.round(hasSatis * carpS)) : '—';

    hurdaHtml += `
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;padding:11px 18px;border-bottom:1px solid #2e2e2e;background:#1a1a1a">
        <span style="font-size:15px;font-weight:600;color:#e8d9b0">${h.label}</span>
        <span style="font-size:15px;font-weight:600;color:#5dba6a;text-align:right">${alis}</span>
        <span style="font-size:15px;font-weight:600;color:#e07050;text-align:right">${satis}</span>
      </div>`;
  });
  document.getElementById('desktopHurdaRows').innerHTML = hurdaHtml;
}

// ── YENİ ÜRÜN EKLE ────────────────────────────────────────────────────────────
window.addUrun = function() {
  const label   = document.getElementById('newLabel').value.trim();
  const alisX   = parseFloat(document.getElementById('newAlisX').value) || 0.993;
  const satisX  = parseFloat(document.getElementById('newSatisX').value) || 1.008;

  if (!label) {
    showToast('Ürün adı girin!');
    return;
  }

  if (!settings.customItems) settings.customItems = [];
  if (!settings.labor) settings.labor = {};
  if (!settings.laborH) settings.laborH = {};

  const id = 'c_' + Date.now();
  settings.customItems.push({id, label, defA: alisX, defS: satisX});
  settings.labor[id]  = {a: alisX, s: satisX};
  settings.laborH[id] = {a: alisX, s: satisX};

  // Hemen kaydet
  localStorage.setItem('gp10', JSON.stringify(settings));
  // jsonbinSave varsa çağır (senin sistemine bağlı)
  // jsonbinSave(settings, ()=>{});

  showToast(`${label} eklendi!`);

  document.getElementById('newLabel').value = '';
  document.getElementById('newAlisX').value = '';
  document.getElementById('newSatisX').value = '';

  renderTable();
  renderAdminRows();
  renderDesktopPanel();
};

// ── KAYDET ────────────────────────────────────────────────────────────────────
function saveAdmin() {
  settings.shopName = document.getElementById('shopName').value.trim() || 'Asil Kuyumcum';

  ensureLaborH();

  // Normal çarpanlar
  [...ITEMS, ...(settings.customItems || [])].forEach(item => {
    const id = item.id;
    settings.labor[id] = {
      a: parseFloat(document.getElementById('a_'+id)?.value) || item.defA,
      s: parseFloat(document.getElementById('s_'+id)?.value) || item.defS,
    };
    settings.laborH[id] = {
      a: parseFloat(document.getElementById('ah_'+id)?.value) || settings.labor[id].a,
      s: parseFloat(document.getElementById('sh_'+id)?.value) || settings.labor[id].s,
    };
  });

  // Döviz
  if (!settings.dovizDuz) settings.dovizDuz = {};
  DOVIZLER.forEach(d => {
    settings.dovizDuz[d.id+'A'] = parseFloat(document.getElementById('duzA_'+d.id)?.value) || 0;
    settings.dovizDuz[d.id+'S'] = parseFloat(document.getElementById('duzS_'+d.id)?.value) || 0;
  });

  // Hurda
  if (!settings.hurdaCarp) settings.hurdaCarp = {};
  HURDALAR.forEach(h => {
    settings.hurdaCarp[h.id+'A'] = parseFloat(document.getElementById('hurdaA_'+h.id)?.value) || (h.oran * 0.99);
    settings.hurdaCarp[h.id+'S'] = parseFloat(document.getElementById('hurdaS_'+h.id)?.value) || h.oran;
  });

  if (settings.adminPass !== ADMIN_PASS) {
    ADMIN_PASS = settings.adminPass;
  }

  localStorage.setItem('gp10', JSON.stringify(settings));
  // jsonbinSave(settings, ...);  ← buraya kendi bulut kaydetme kodunu koy

  renderTable();
  renderDesktopPanel();
  closeAdmin();
  showToast('Ayarlar kaydedildi ✓');
}

// ── HAREKETLİ MOD ─────────────────────────────────────────────────────────────
document.getElementById('modBtn')?.addEventListener('click', () => {
  const btn = document.getElementById('modBtn');
  btn.classList.toggle('hareketli');
  renderTable();
  renderDesktopPanel();
});

// ── TV MODU ───────────────────────────────────────────────────────────────────
function toggleTV() {
  document.documentElement.classList.toggle('tv-mode');
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

// ── BAŞLATMA ──────────────────────────────────────────────────────────────────
settings = loadSettings();
ADMIN_PASS = settings.adminPass || '1234';

renderTable();
renderDesktopPanel();

// Admin butonu görünürlüğü
if (!location.search.includes('admin') && !location.hash.includes('admin')) {
  document.getElementById('adminBtn').style.display = 'none';
} else {
  IS_ADMIN = true;
  openAdmin();
}

// Fiyat çekme simülasyonu (gerçek API'nı buraya koy)
function fetchPrices() {
  // Örnek veri - gerçekte XAU/USD API kullan
  hasAlis  = 3200 + Math.random()*20 - 10;
  hasSatis = hasAlis * 1.005;

  // Döviz örnek
  liveDoviz = {
    usdAlis: 34.20, usdSatis: 34.35,
    eurAlis: 36.80, eurSatis: 37.00,
    // ...
  };

  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('tr-TR');
  renderTable();
  renderDesktopPanel();
  renderAdminDoviz();
  renderAdminHurda();
}

fetchPrices();
setInterval(fetchPrices, 8000);

// Admin butonu tıklama
document.getElementById('adminBtn')?.addEventListener('click', () => {
  if (IS_ADMIN) {
    openAdmin();
  } else {
    const pass = prompt('Admin şifresi:');
    if (pass === ADMIN_PASS) {
      IS_ADMIN = true;
      openAdmin();
    } else {
      showToast('Yanlış şifre!');
    }
  }
});
</script>
